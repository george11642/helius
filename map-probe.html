      function mlog(obj) {
        console.log('MAPPROBE:' + JSON.stringify(obj));

      // ?pack=chamonix&lat=..&lon=..&zoom=.. overrides the default (sandia).
      // Center/zoom/fix/route are per-pack presets below; any of lat/lon/zoom
      // in the URL overrides just that value on top of the chosen preset.
      const params = new URLSearchParams(location.search);
      const pack = params.get('pack') || 'sandia';

      // Fixed test polyline standing in for a real routed path: a gentle
      // interpolation between two points, with a bit of perpendicular wiggle
      // so it reads as a trail and not a ruler line. Deterministic and
      // embedded here — no fetch involved, so this page can probe
      // drawRoute()'s animation/marker logic in isolation from the
      // routing/graph module.
      function buildWiggleFixtureRoute(start, end) {
        const n = 12;
        const dLon = end[0] - start[0];
        const dLat = end[1] - start[1];
        const len = Math.hypot(dLon, dLat);
        const perp = [-dLat / len, dLon / len]; // unit vector perpendicular to the start->end direction
        const wiggleAmplitude = 0.0035;
        const coordinates = [];
        for (let i = 0; i < n; i++) {
          const t = i / (n - 1);
          const wiggle = Math.sin(t * Math.PI * 2.5) * wiggleAmplitude * Math.sin(t * Math.PI); // tapers to 0 at both ends
          coordinates.push([
            start[0] + dLon * t + perp[0] * wiggle,
            start[1] + dLat * t + perp[1] * wiggle,
          ]);
        }
        return { type: 'LineString', coordinates };
      }

      // Per-pack demo presets. URL params (lat/lon/zoom) override individual
      // values on top of whichever preset `pack` selects.
      const PRESETS = {
        sandia: {
          center: [-106.4439, 35.1983], // La Luz switchbacks
          zoom: 13,
          fix: { lat: 35.1983, lon: -106.4439, accuracyM: 15 },
          route: () => buildWiggleFixtureRoute([-106.4439, 35.1983], [-106.4818, 35.2286]),
        },
        chamonix: {
          center: [6.8694, 45.9237], // Chamonix-Mont-Blanc centre
          zoom: 12,
          fix: { lat: 45.97, lon: 6.885, accuracyM: 20 }, // near Refuge du Lac Blanc, the route's start
          route: () => CHAMONIX_ROUTE,
        },
      };
      const preset = PRESETS[pack] ?? PRESETS.sandia;
      const centerLat = params.has('lat') ? Number(params.get('lat')) : preset.center[1];
      const centerLon = params.has('lon') ? Number(params.get('lon')) : preset.center[0];
      const zoom = params.has('zoom') ? Number(params.get('zoom')) : preset.zoom;

      function measureFps(map, durationMs) {
        return new Promise((resolve) => {
          let frames = 0;
          const startTime = performance.now();
          const onRender = () => frames++;
          map.on('render', onRender);
          setTimeout(() => {
            map.off('render', onRender);
            const elapsedSec = (performance.now() - startTime) / 1000;
            resolve(frames / elapsedSec);
          }, durationMs);
        });
      }

      const heliusMap = new HeliusMap();
      const fixtureRoute = preset.route();
      let idleCount = 0;

      mlog({ event: 'probe-config', pack, center: [centerLon, centerLat], zoom });

      heliusMap
        .init(document.getElementById('map'), pack)
        .then(async () => {
          const map = heliusMap.instance;
          if (!map) {
            mlog({ event: 'init-skipped', reason: 'webgl-unsupported' });
            return;
          }

          mlog({ event: 'style-loaded' });

          map.on('idle', () => {
            idleCount += 1;
            mlog({ event: 'idle', count: idleCount });
          });

          map.on('error', (e) => {
            mlog({
              event: 'error',
              sourceId: e && e.sourceId,
              message: (e && e.error && e.error.message) || String(e),
            });
          });

          // render.ts's init() always centers on the Sandia default — jump to
          // this pack's preset (a no-op for the default sandia/no-params
          // case, since it matches what init() already set).
          map.jumpTo({ center: [centerLon, centerLat], zoom });

          heliusMap.setFix(preset.fix.lat, preset.fix.lon, preset.fix.accuracyM);
          mlog({ event: 'fix-set', lat: preset.fix.lat, lon: preset.fix.lon, accuracyM: preset.fix.accuracyM });

          const fpsPromise = measureFps(map, 3000);
          map.easeTo({ center: [centerLon + 0.01, centerLat - 0.01], zoom: zoom + 0.4, duration: 3000 });
          const fps = await fpsPromise;
          mlog({ event: 'fps-estimate', fps: Math.round(fps * 10) / 10, windowMs: 3000 });

          setTimeout(() => {
            heliusMap.drawRoute(fixtureRoute, { animateMs: 1500 });
            mlog({ event: 'route-drawn', points: fixtureRoute.coordinates.length });
            heliusMap.flyToRoute();
          }, 2000);
        })
        .catch((err) => {
          mlog({ event: 'init-error', message: String(err) });
        });

      let terrainOn = true;
      document.getElementById('btn-terrain').addEventListener('click', () => {
        const map = heliusMap.instance;
        if (!map) return;
        terrainOn = !terrainOn;
        for (const id of ['hillshade', 'contours-minor', 'contours-major', 'contours-label']) {
          if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', terrainOn ? 'visible' : 'none');
        }
        mlog({ event: 'terrain-toggled', on: terrainOn });
      });

      document.getElementById('btn-beacon').addEventListener('click', () => {
        heliusMap.setBeaconMode(!heliusMap.isBeaconOn);
        mlog({ event: 'beacon-toggled', on: heliusMap.isBeaconOn });
      });

      document.getElementById('btn-replay').addEventListener('click', () => {
        heliusMap.clearRoute();
        heliusMap.drawRoute(fixtureRoute, { animateMs: 1500 });
        mlog({ event: 'route-replayed' });
        heliusMap.flyToRoute();
      });
